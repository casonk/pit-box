<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>pit-box</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px 16px;
      padding-top: max(20px, calc(env(safe-area-inset-top) + 8px));
      padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
    }
    header { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #e6edf3;
      font-family: ui-monospace, monospace;
    }
    .dot { width: 8px; height: 8px; background: #3fb950; border-radius: 50%; flex-shrink: 0; }
    .env-badge {
      display: none;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: ui-monospace, monospace;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 700;
      flex-shrink: 0;
    }
    .env-prod { background: #0d2818; color: #3fb950; border: 1px solid #2ea043; }
    .env-dev  { background: #2a1f00; color: #e3b341; border: 1px solid #9e6a03; }
    .env-switch {
      font-size: 12px;
      color: #58a6ff;
      text-decoration: none;
      margin-left: 6px;
      flex-shrink: 0;
    }
    .env-switch:hover { text-decoration: underline; }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px;
    }
    .stat-label {
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #e6edf3;
      font-family: ui-monospace, monospace;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-green { background: #238636; border: 1px solid #2ea043; color: #fff; }
    .btn-green:active { background: #2ea043; }
    .btn-gray  { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; }
    .btn-gray:active  { background: #2d333b; }
    .section { margin-top: 28px; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8b949e;
    }
    .section-count {
      font-size: 11px;
      color: #8b949e;
      font-family: ui-monospace, monospace;
    }
    .win-grid,
    .term-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .win-card,
    .term-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .win-card.active { background: #0d1f0e; border-color: #3fb950; }
    .win-card.bell   { background: #1a1400; border-color: #d29922; }
    .win-card.stale  { opacity: 0.45; }
    .win-live,
    .term-live {
      text-align: center;
      padding: 6px 4px 0;
      font-size: 10px;
      color: #3fb950;
      font-family: ui-monospace, monospace;
      letter-spacing: 0.04em;
    }
    .win-live.s-run   { color: #58a6ff; }
    .win-live.s-bell  { color: #d29922; }
    .win-live.s-stale { color: #484f58; }
    .win-cmd {
      text-align: center;
      font-size: 9px;
      color: #58a6ff;
      font-family: ui-monospace, monospace;
      padding: 0 4px 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ov-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 11px;
      font-family: ui-monospace, monospace;
      margin-bottom: 8px;
      min-height: 16px;
    }
    .ov-run   { color: #58a6ff; }
    .ov-bell  { color: #d29922; }
    .ov-stale { color: #484f58; }
    .ov-sep   { color: #30363d; }
    .win-open,
    .term-window {
      display: block;
      padding: 8px 8px 6px;
      text-align: center;
      text-decoration: none;
      color: #58a6ff;
      font-family: ui-monospace, monospace;
      font-size: 22px;
      font-weight: 700;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .term-window { color: #e6edf3; }
    .win-card.active .win-open { color: #79c0ff; }
    .win-open:active { background: #1c2128; }
    .win-name,
    .term-name,
    .term-session {
      text-align: center;
      font-size: 10px;
      color: #8b949e;
      font-family: ui-monospace, monospace;
      padding: 0 4px 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .term-session { color: #484f58; }
    .win-card.active .win-name { color: #8b949e; }
    .win-kill {
      display: block;
      padding: 7px;
      text-align: center;
      background: transparent;
      border: none;
      border-top: 1px solid #21262d;
      color: #484f58;
      font-size: 11px;
      cursor: pointer;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .win-kill:active { color: #f85149; background: #200a0a; }
    .empty {
      color: #484f58;
      font-size: 14px;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>pit-box</h1>
    <span id="env-badge" class="env-badge"></span>
    <a  id="env-switch" class="env-switch" href="#" style="display:none"></a>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Windows</div>
      <div class="stat-value" id="stat-windows">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Live terminals</div>
      <div class="stat-value" id="stat-terminals">0</div>
    </div>
  </div>

  <a class="btn btn-green" href="/term" id="btn-open">Open Terminal</a>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
    <button class="btn btn-gray" id="btn-new" style="margin-bottom:0">+ New Window</button>
    <a class="btn btn-gray" href="/term?action=sessions" style="margin-bottom:0">Sessions</a>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-label">Windows</div>
      <div class="section-count" id="windows-count">0 total</div>
    </div>
    <div class="ov-row" id="win-overview"></div>
    <div class="win-grid" id="win-grid">
      <div class="empty" style="grid-column:1/-1">Loading...</div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-label">Live terminals</div>
      <div class="section-count" id="terminals-count">0 connected</div>
    </div>
    <div class="term-grid" id="term-grid">
      <div class="empty" style="grid-column:1/-1">Loading...</div>
    </div>
  </div>

  <div class="section" id="ext-services-section" style="display:none">
    <div class="section-head">
      <div class="section-label">Launch</div>
    </div>
    <div id="ext-services-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px"></div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-label">Services</div>
      <div class="section-count" id="rebuild-status"></div>
    </div>
    <div id="svc-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
      <button class="btn btn-green" data-rebuild="smart" style="margin:0;grid-column:1/-1">deploy</button>
      <details style="grid-column:1/-1;margin:0">
        <summary style="cursor:pointer;color:#8b949e;font-size:12px;padding:4px 0;user-select:none">advanced</summary>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px">
          <button class="btn btn-gray" data-rebuild="ttyd"     style="margin:0">rebuild ttyd</button>
          <button class="btn btn-gray" data-rebuild="api"      style="margin:0">rebuild api</button>
          <button class="btn btn-gray" data-rebuild="caddy"    style="margin:0">rebuild caddy</button>
          <button class="btn btn-gray" data-rebuild="dns"      style="margin:0">rebuild dns</button>
          <button class="btn btn-gray" data-rebuild="all"      style="margin:0;grid-column:1/-1">rebuild all</button>
          <button class="btn btn-gray" data-rebuild="activate" style="margin:0;grid-column:1/-1">activate (install scripts + sudoers)</button>
        </div>
      </details>
      <button class="btn btn-green" id="btn-promote" style="margin:0;grid-column:1/-1;display:none">promote to prod ↑</button>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-label">Tools</div>
      <div class="section-count" id="task-status"></div>
    </div>
    <div id="task-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
      <button class="btn btn-gray" data-task="validate"       style="margin:0">validate</button>
      <button class="btn btn-gray" data-task="render-configs" style="margin:0">render configs</button>
      <button class="btn btn-gray" data-task="package-client" style="margin:0;grid-column:1/-1">package client</button>
    </div>
    <pre id="task-output" style="display:none;margin-top:10px;font-size:11px;font-family:ui-monospace,monospace;color:#8b949e;background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-word"></pre>
  </div>

  <div id="rebuild-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;padding:20px;box-sizing:border-box">
    <div style="background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;width:100%;max-width:320px">
      <div id="modal-label" style="font-size:13px;font-weight:600;color:#e6edf3;font-family:ui-monospace,monospace;margin-bottom:14px"></div>
      <input type="password" id="modal-pwd" autocomplete="current-password" placeholder="sudo password"
        style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 12px;color:#e6edf3;font-size:15px;margin-bottom:12px;outline:none;-webkit-appearance:none;box-sizing:border-box">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button id="modal-cancel" class="btn btn-gray" style="margin:0">Cancel</button>
        <button id="modal-ok"     class="btn btn-green" style="margin:0">Rebuild</button>
      </div>
      <pre id="modal-out" style="display:none;margin-top:12px;font-size:11px;font-family:ui-monospace,monospace;color:#8b949e;background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px;max-height:180px;overflow-y:auto;white-space:pre-wrap;word-break:break-word"></pre>
    </div>
  </div>

  <script>
  (function () {
    function readJson(url, options) {
      return fetch(url, options).then(function (response) {
        if (!response.ok) {
          throw new Error('HTTP ' + response.status + ' for ' + url);
        }
        return response.json();
      });
    }

    function esc(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function setCounts(windowCount, terminalCount) {
      document.getElementById('stat-windows').textContent = String(windowCount);
      document.getElementById('stat-terminals').textContent = String(terminalCount);
      document.getElementById('windows-count').textContent = windowCount + ' total';
      document.getElementById('terminals-count').textContent = terminalCount + ' connected';
    }

    var SHELLS = { bash:1, zsh:1, sh:1, fish:1, dash:1, csh:1, tcsh:1, ksh:1, '-bash':1, '-zsh':1, '-sh':1 };

    function windowStatus(w) {
      if (w.dead) return 'stale';
      if (w.bell) return 'bell';
      if (w.cmd && !SHELLS[w.cmd.toLowerCase()]) return 'running';
      return 'idle';
    }

    function renderWindows(windows) {
      var grid = document.getElementById('win-grid');
      var ov   = document.getElementById('win-overview');
      if (!windows.length) {
        grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No tmux windows</div>';
        ov.innerHTML = '';
        return;
      }

      var nRun = 0, nBell = 0, nStale = 0;

      grid.innerHTML = windows.map(function (w) {
        var status = windowStatus(w);
        if (status === 'running') { nRun++; }
        if (status === 'bell')    { nBell++; }
        if (status === 'stale')   { nStale++; }

        var cardCls = 'win-card' + (w.active ? ' active' : '') +
          (status === 'bell' ? ' bell' : '') + (status === 'stale' ? ' stale' : '');

        var badge;
        if (w.active)              { badge = '<div class="win-live">● live</div>'; }
        else if (status === 'bell')    { badge = '<div class="win-live s-bell">⚠</div>'; }
        else if (status === 'stale')   { badge = '<div class="win-live s-stale">✗ stale</div>'; }
        else if (status === 'running') { badge = '<div class="win-live s-run">▶</div>'; }
        else                           { badge = ''; }

        var cmdLine = (status === 'running') ?
          '<div class="win-cmd">' + esc(w.cmd) + '</div>' : '';

        return '<div class="' + cardCls + '">' +
          badge +
          '<a class="win-open" href="/term?window=' + w.index + '">' + esc(w.index) + '</a>' +
          '<div class="win-name">' + esc(w.name) + '</div>' +
          cmdLine +
          '<button class="win-kill" data-index="' + w.index + '">kill</button>' +
        '</div>';
      }).join('');

      var parts = [];
      if (nRun)   { parts.push('<span class="ov-run">▶ ' + nRun + ' running</span>'); }
      if (nBell)  { parts.push('<span class="ov-bell">⚠ ' + nBell + ' needs input</span>'); }
      if (nStale) { parts.push('<span class="ov-stale">✗ ' + nStale + ' stale</span>'); }
      ov.innerHTML = parts.join('<span class="ov-sep"> · </span>');
    }

    function renderTerminals(terminals) {
      var grid = document.getElementById('term-grid');
      if (!terminals.length) {
        grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No live browser terminals</div>';
        return;
      }
      grid.innerHTML = terminals.map(function (terminalInfo) {
        return '<div class="term-card">' +
          '<div class="term-live">live</div>' +
          '<div class="term-window">' + esc(terminalInfo.current_window) + '</div>' +
          '<div class="term-name">' + esc(terminalInfo.current_name) + '</div>' +
          '<div class="term-session">' + esc(terminalInfo.name) + '</div>' +
        '</div>';
      }).join('');
    }

    function renderState(state) {
      var windows = Array.isArray(state) ? state : (state.windows || []);
      var terminals = Array.isArray(state) ? [] : (state.terminals || []);
      setCounts(windows.length, terminals.length);
      renderWindows(windows);
      renderTerminals(terminals);
    }

    function loadState() {
      readJson('/api/state', { cache: 'no-store' })
        .then(renderState)
        .catch(function () {
          readJson('/api/windows', { cache: 'no-store' })
            .then(renderState)
            .catch(function () { renderState({ windows: [], terminals: [] }); });
        });
    }

    document.getElementById('win-grid').addEventListener('click', function (event) {
      var button = event.target.closest('.win-kill');
      if (!button) { return; }
      var index = button.getAttribute('data-index');
      button.textContent = '...';
      readJson('/api/windows/' + index, { method: 'DELETE' })
        .then(loadState)
        .catch(loadState);
    });

    document.getElementById('btn-new').addEventListener('click', function () {
      window.location.href = '/term?action=new';
    });

    var modalEl     = document.getElementById('rebuild-modal');
    var modalLabel  = document.getElementById('modal-label');
    var modalPwd    = document.getElementById('modal-pwd');
    var modalOk     = document.getElementById('modal-ok');
    var modalCancel = document.getElementById('modal-cancel');
    var modalOut    = document.getElementById('modal-out');
    var modalSvc    = null;
    var modalMode   = 'rebuild';
    var modalBusy   = false;
    var modalDone   = false;

    function openRebuildModal(service) {
      modalSvc  = service;
      modalMode = 'rebuild';
      modalBusy = false;
      modalDone = false;
      modalLabel.textContent = 'rebuild ' + service;
      modalPwd.value = '';
      modalOk.textContent = 'Rebuild';
      modalOk.disabled = false;
      modalCancel.disabled = false;
      modalOut.style.display = 'none';
      modalOut.textContent = '';
      modalEl.style.display = 'flex';
      setTimeout(function () { modalPwd.focus(); }, 50);
    }

    function openPromoteModal() {
      modalSvc  = null;
      modalMode = 'promote';
      modalBusy = false;
      modalDone = false;
      modalLabel.textContent = 'promote to prod — render configs + rebuild all services';
      modalPwd.value = '';
      modalOk.textContent = 'Promote';
      modalOk.disabled = false;
      modalCancel.disabled = false;
      modalOut.style.display = 'none';
      modalOut.textContent = '';
      modalEl.style.display = 'flex';
      setTimeout(function () { modalPwd.focus(); }, 50);
    }

    function closeRebuildModal() {
      if (modalBusy) { return; }
      modalEl.style.display = 'none';
      modalSvc = null;
    }

    function doRebuild() {
      if (modalDone) { closeRebuildModal(); return; }
      if (modalMode === 'rebuild' && !modalSvc) { return; }
      if (modalBusy) { return; }
      modalBusy = true;
      modalOut.style.display = 'none';
      var isPromote = (modalMode === 'promote');
      modalOk.textContent = isPromote ? 'promoting…' : 'rebuilding…';
      modalOk.disabled = true;
      modalCancel.disabled = true;
      var svc = modalSvc;
      var url  = isPromote ? '/api/promote' : '/api/rebuild';
      var body = isPromote
        ? JSON.stringify({ password: modalPwd.value })
        : JSON.stringify({ service: svc, password: modalPwd.value });
      readJson(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: body
      }).then(function (result) {
        modalBusy = false;
        modalCancel.disabled = false;
        var out = result.output || result.error || '';
        if (out) {
          modalOut.textContent = out;
          modalOut.style.display = 'block';
          modalOut.scrollTop = modalOut.scrollHeight;
        }
        if (result.ok) {
          modalOk.textContent = 'Close';
          modalDone = true;
          modalOk.disabled = false;
        } else {
          if (!out) {
            modalOut.textContent = isPromote ? 'promote failed' : 'rebuild failed';
            modalOut.style.display = 'block';
          }
          modalOk.textContent = 'Retry';
          modalOk.disabled = false;
        }
      }).catch(function () {
        modalBusy = false;
        modalCancel.disabled = false;
        if (isPromote || svc === 'api' || svc === 'all' || svc === 'smart') {
          modalOut.textContent = '(connection closed — service restarted)';
          modalOut.style.display = 'block';
          modalOk.textContent = 'Close';
          modalDone = true;
          modalOk.disabled = false;
        } else {
          modalOut.textContent = 'request failed';
          modalOut.style.display = 'block';
          modalOk.textContent = 'Retry';
          modalOk.disabled = false;
        }
      });
    }

    modalPwd.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !modalBusy) { doRebuild(); }
    });
    modalOk.addEventListener('click', doRebuild);
    modalCancel.addEventListener('click', closeRebuildModal);
    modalEl.addEventListener('click', function (e) {
      if (e.target === modalEl) { closeRebuildModal(); }
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && modalEl.style.display === 'flex') { closeRebuildModal(); }
    });

    document.getElementById('svc-grid').addEventListener('click', function (event) {
      var button = event.target.closest('[data-rebuild]');
      if (button) { openRebuildModal(button.getAttribute('data-rebuild')); return; }
    });

    document.getElementById('btn-promote').addEventListener('click', openPromoteModal);

    document.getElementById('task-grid').addEventListener('click', function (event) {
      var button = event.target.closest('[data-task]');
      if (!button || button.disabled) { return; }
      var task    = button.getAttribute('data-task');
      var label   = button.textContent;
      var outEl   = document.getElementById('task-output');
      var statEl  = document.getElementById('task-status');
      button.textContent = '…';
      button.disabled = true;
      outEl.style.display = 'none';
      if (statEl) { statEl.textContent = 'running…'; }
      readJson('/api/task', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task: task })
      }).then(function (result) {
        button.textContent = label;
        button.disabled = false;
        if (statEl) { statEl.textContent = result.ok ? 'ok' : 'failed'; }
        var out = result.output || (!result.ok && (result.error || 'failed')) || '';
        if (out) {
          outEl.textContent = out;
          outEl.style.display = 'block';
        }
      }).catch(function () {
        button.textContent = label;
        button.disabled = false;
        if (statEl) { statEl.textContent = 'request failed'; }
      });
    });

    function renderEnv(env) {
      var badge   = document.getElementById('env-badge');
      var toggle  = document.getElementById('env-switch');
      var promote = document.getElementById('btn-promote');
      var label   = (env.label || '').toLowerCase();
      if (badge && label) {
        badge.textContent = label;
        badge.className = 'env-badge env-' + label;
        badge.style.display = 'inline-block';
      }
      if (toggle && env.sibling_url) {
        var siblingLabel = env.sibling_label || (label === 'prod' ? 'dev' : 'prod');
        toggle.textContent = '→ ' + siblingLabel;
        toggle.href = env.sibling_url;
        toggle.style.display = 'inline';
      }
      if (promote && label === 'dev') {
        promote.style.display = 'block';
      }
      var section = document.getElementById('ext-services-section');
      var grid    = document.getElementById('ext-services-grid');
      var svc = env.services || {};
      var btns = [];
      if (svc.cockpit) {
        btns.push(
          '<a class="btn btn-gray" href="' + esc(svc.cockpit) + '" target="_blank" rel="noopener noreferrer" style="margin:0">Open Cockpit</a>'
        );
      }
      if (svc.desktop) {
        btns.push(
          '<a class="btn btn-gray" href="' + esc(svc.desktop) + '" target="_blank" rel="noopener noreferrer" style="margin:0">Open Desktop</a>'
        );
      }
      if (btns.length && section && grid) {
        grid.innerHTML = btns.join('');
        section.style.display = 'block';
      }
    }

    function loadEnv() {
      fetch('/api/env', { cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) { if (data) { renderEnv(data); } })
        .catch(function () {});
    }

    document.addEventListener('visibilitychange', function () {
      if (!document.hidden) { loadState(); }
    });

    window.setInterval(loadState, 4000);
    loadState();
    loadEnv();
  }());
  </script>
</body>
</html>

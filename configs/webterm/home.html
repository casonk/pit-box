<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>pit-box</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px 16px;
      padding-top: max(20px, calc(env(safe-area-inset-top) + 8px));
      padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #e6edf3;
      font-family: ui-monospace, monospace;
    }
    .dot { width: 8px; height: 8px; background: #3fb950; border-radius: 50%; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      margin-bottom: 10px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-green  { background: #238636; border: 1px solid #2ea043; color: #fff; }
    .btn-green:active  { background: #2ea043; }
    .btn-gray   { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; }
    .btn-gray:active   { background: #2d333b; }
    .section { margin-top: 28px; }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8b949e;
      margin-bottom: 12px;
    }
    .win-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .win-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .win-open {
      display: block;
      padding: 18px 8px 12px;
      text-align: center;
      text-decoration: none;
      color: #58a6ff;
      font-family: ui-monospace, monospace;
      font-size: 24px;
      font-weight: 700;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .win-open:active { background: #1c2128; }
    .win-kill {
      display: block;
      padding: 7px;
      text-align: center;
      text-decoration: none;
      color: #484f58;
      font-size: 11px;
      border-top: 1px solid #21262d;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .win-kill:active { color: #f85149; background: #200a0a; }
  </style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>pit-box</h1>
  </header>

  <a class="btn btn-green" href="/term">Open Terminal</a>
  <a class="btn btn-gray"  href="/term?action=new">+ New Window</a>

  <div class="section">
    <div class="section-label">Windows</div>
    <div class="win-grid">
      <div class="win-card"><a class="win-open" href="/term?window=1">1</a><a class="win-kill" href="/term?kill=1">kill</a></div>
      <div class="win-card"><a class="win-open" href="/term?window=2">2</a><a class="win-kill" href="/term?kill=2">kill</a></div>
      <div class="win-card"><a class="win-open" href="/term?window=3">3</a><a class="win-kill" href="/term?kill=3">kill</a></div>
      <div class="win-card"><a class="win-open" href="/term?window=4">4</a><a class="win-kill" href="/term?kill=4">kill</a></div>
      <div class="win-card"><a class="win-open" href="/term?window=5">5</a><a class="win-kill" href="/term?kill=5">kill</a></div>
      <div class="win-card"><a class="win-open" href="/term?window=6">6</a><a class="win-kill" href="/term?kill=6">kill</a></div>
      <div class="win-card"><a class="win-open" href="/term?window=7">7</a><a class="win-kill" href="/term?kill=7">kill</a></div>
      <div class="win-card"><a class="win-open" href="/term?window=8">8</a><a class="win-kill" href="/term?kill=8">kill</a></div>
      <div class="win-card"><a class="win-open" href="/term?window=9">9</a><a class="win-kill" href="/term?kill=9">kill</a></div>
    </div>
  </div>
</body>
</html>
